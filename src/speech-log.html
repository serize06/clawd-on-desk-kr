<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  html,body{margin:0;padding:0;background:#18181b;color:#f4f4f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif;
    height:100vh;overflow:hidden;}
  header{padding:14px 18px;background:#27272a;border-bottom:1px solid rgba(255,255,255,0.08);
    display:flex;justify-content:space-between;align-items:center;}
  header h2{margin:0;font-size:15px;color:#d97757;}
  header button{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
    color:#f4f4f5;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;}
  header button:hover{background:rgba(255,255,255,0.15);}
  #list{height:calc(100vh - 52px);overflow-y:auto;padding:8px 18px;}
  .entry{padding:10px 14px;margin-bottom:8px;background:rgba(255,255,255,0.04);
    border-left:3px solid #d97757;border-radius:6px;display:flex;gap:12px;align-items:flex-start;}
  .ts{color:rgba(255,255,255,0.4);font-size:11px;white-space:nowrap;font-family:monospace;flex-shrink:0;}
  .text{flex:1;font-size:13px;line-height:1.4;word-break:break-word;}
  #list::-webkit-scrollbar{width:8px;}
  #list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}
  .empty{text-align:center;color:rgba(255,255,255,0.3);padding:40px;}
</style>
</head><body>
<header>
  <h2>💬 Clawd 말 기록</h2>
  <div>
    <button onclick="window.speechLogAPI.clear()">🗑 비우기</button>
    <button onclick="refresh()">🔄 새로고침</button>
  </div>
</header>
<div id="list"></div>
<script>
  const listEl = document.getElementById("list");
  function fmt(ts){const d=new Date(ts);
    return d.toLocaleTimeString("ko-KR",{hour12:false})+"."+String(d.getMilliseconds()).padStart(3,"0").slice(0,2);}
  async function refresh(){
    const log = await window.speechLogAPI.get();
    if (!log.length) { listEl.innerHTML = '<div class="empty">아직 말한 내용이 없어요.</div>'; return; }
    listEl.innerHTML = log.slice().reverse().map(e =>
      `<div class="entry"><div class="ts">${fmt(e.ts)}</div><div class="text">${escape(e.text)}</div></div>`
    ).join("");
  }
  function escape(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);}
  window.speechLogAPI.onChanged(refresh);
  refresh();
</script>
</body></html>
